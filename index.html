<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #f8ff9a, #f8fac4);
    font-family: Arial;
    text-align: center;
}


    
   

#yesBtn {
    background-color: #28a745;
    color: white;
    box-shadow: 0 0 15px rgba(40,167,69,0.6);
}

#noBtn {
    background-color: #dc3545;
    color: white;
    box-shadow: 0 0 15px rgba(220,53,69,0.6);
}

h1 {
    font-size: 38px;
    color: #333;
}

button {
    padding: 12px 22px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background-color: #28a745;
    color: white;
}

#yesBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    background-color: #dc3545;
    color: white;
    position: absolute;
}

/* Photo */
#photoBox img {
    width: 230px;
    border-radius: 15px;
    margin-top: 15px;
    display: none;
    animation: fade 6s ease;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Teddy */
#teddy {
    position: absolute;
    bottom: 50px;
    left: 150px;
    width: 120px;
    animation: walk 5s linear forwards;
}

@keyframes walk {
    0% { left: -150px; }
    100% { left: 40%; }
}


#speech {
    position: absolute;
    bottom: 180px;
    left: 35%;
    background: white;
    
    padding: 10px;
    border-radius: 10px;
    display: none;
}
.maff{font-family: monospace;
    text-align: center;
    opacity: 80%;
    
}
/* Hearts */
.heart {
    position: absolute;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% { top: -10%; opacity:1;}
    100% { top: 110%; opacity:0;}
}

</style>
</head>
